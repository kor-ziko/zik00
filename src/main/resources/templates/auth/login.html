<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | SHOP</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell auth-shell--login">
    <section class="auth-card login-card">
        <a class="brand" th:href="@{/}">SHOP</a>
        <p class="eyebrow">WELCOME BACK</p>
        <h1>로그인</h1>
        <p class="lead">Google 계정으로 간편하게 시작하세요.</p>

        <p class="alert alert--error" th:if="${param.error}">Google 로그인에 실패했습니다. 다시 시도해주세요.</p>
        <p class="alert alert--success" th:if="${param.logout}">로그아웃되었습니다.</p>

        <a class="google-button" th:href="@{/oauth2/authorization/google}">
            <svg aria-hidden="true" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4a4.6 4.6 0 0 1-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.3z"/>
                <path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 1-3.4 1a5.8 5.8 0 0 1-5.5-4H3.2v2.6A10 10 0 0 0 12 22z"/>
                <path fill="#FBBC05" d="M6.5 14.1a6 6 0 0 1 0-4V7.4H3.2a10 10 0 0 0 0 9.2l3.3-2.5z"/>
                <path fill="#EA4335" d="M12 5.9c1.5 0 2.8.5 3.8 1.5l2.9-2.8A9.7 9.7 0 0 0 3.2 7.4l3.3 2.6A5.8 5.8 0 0 1 12 5.9z"/>
            </svg>
            Google로 계속하기
        </a>
        <p class="fine-print">최초 로그인 시 배송 및 회원 정보를 한 번만 입력합니다.</p>
    </section>
</main>
</body>
</html>
