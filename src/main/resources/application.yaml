server:
  address: 127.0.0.1
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: shop
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1q2w3e}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-google-client-secret}
            scope:
              - profile
              - email

shop:
  jwt:
    secret: ${JWT_SECRET:${GOOGLE_CLIENT_SECRET:local-jwt-secret-change-me-at-least-32-characters}}
    issuer: zik00-shop
    access-token-ttl: PT15M
    refresh-token-ttl: P14D
    cookie-secure: ${JWT_COOKIE_SECURE:false}
  oauth:
    token-encryption-key: ${OAUTH_TOKEN_ENCRYPTION_KEY:${GOOGLE_CLIENT_SECRET:local-token-encryption-key-change-me}}
  frontend:
    base-url: ${SHOP_FRONTEND_BASE_URL:http://localhost:5174}
  admin:
    base-url: ${SHOP_ADMIN_BASE_URL:http://127.0.0.1:5173}
  upload:
    inquiry-image-dir: ${SHOP_INQUIRY_IMAGE_DIR:uploads/inquiries_images}
