server:
  address: 127.0.0.1
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: shop
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope:
              - profile
              - email

shop:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    issuer: zik00-shop
    access-token-ttl: PT15M
    refresh-token-ttl: P14D
    cookie-secure: ${JWT_COOKIE_SECURE:false}
  pii:
    current-key-version: ${PII_CURRENT_KEY_VERSION:v1}
    encryption-keys: ${PII_ENCRYPTION_KEYS}
    migrate-plaintext-on-startup: ${PII_MIGRATE_PLAINTEXT_ON_STARTUP:false}
  frontend:
    base-url: ${SHOP_FRONTEND_BASE_URL:http://localhost:5174}
  admin:
    base-url: ${SHOP_ADMIN_BASE_URL:http://127.0.0.1:5173}
  upload:
    inquiry-image-dir: ${SHOP_INQUIRY_IMAGE_DIR:uploads/inquiries_images}
